name: Auto-Convert Excel Data on Push

on:
  push:
    paths:
      - 'public/data.xlsx'
    branches:
      - master
      - main

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install xlsx

      - name: Convert data.xlsx to products.json
        run: node excel-converter.js public/data.xlsx public/products.json

      - name: Check if products.json changed
        id: check_changes
        run: |
          if git diff --quiet public/products.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/products.json
          git commit -m "chore: auto-convert Excel data to products.json"
          git push

name: Auto-Convert Excel Data on Push

on:
  push:
    paths:
      - 'public/data.xlsx'
    branches:
      - master
      - main

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Convert data.xlsx to products.json
        run: node excel-converter.js public/data.xlsx public/products.json

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/products.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate products.json from data.xlsx" && git push)
